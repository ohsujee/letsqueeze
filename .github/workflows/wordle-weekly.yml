name: Assign Wordle Words (DISABLED — words pre-seeded in Firebase until 2029)

on:
  workflow_dispatch:  # Manual only, no more cron

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install firebase-admin
        run: pip install firebase-admin --quiet

      - name: Assign Wordle words for the next 7 days
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          FIREBASE_DATABASE_URL: https://letsqueeze-default-rtdb.europe-west1.firebasedatabase.app
        run: python3 .github/scripts/wordle_weekly.py
